<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFEye | Geleceğin Akıllı Bağlantı Sistemleri</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2d8cff;
            --secondary: #00f2fe;
            --bg-dark: #060b16;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-glow: 0 0 10px rgba(45, 140, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- Animasyonlu Arka Plan --- */
        .background-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #0d1d40 0%, #060b16 100%);
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            z-index: -1;
            animation: moveStars 100s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        /* --- Navigasyon --- */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            background: rgba(6, 11, 22, 0.7);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--primary);
            text-shadow: var(--text-glow);
            text-decoration: none;
        }

        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { color: white; text-decoration: none; font-weight: 500; transition: 0.3s; font-size: 0.9rem; text-transform: uppercase; }
        nav a:hover { color: var(--secondary); text-shadow: var(--text-glow); }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero-content {
            max-width: 900px;
            animation: fadeIn 1.5s ease-out;
            padding-top: 80px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: #b0c4de;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        /* --- Kartvizit Görseli Animasyonu --- */
        .card-preview {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 50px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(45, 140, 255, 0.3);
            border: 1px solid var(--glass-border);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        .card-preview img { width: 100%; display: block; }

        /* --- Butonlar --- */
        .btn-group { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-primary { background: var(--primary); color: white; border: none; box-shadow: 0 0 20px rgba(45, 140, 255, 0.4); }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(45, 140, 255, 0.6); }

        .btn-outline { background: transparent; color: white; border: 1px solid var(--primary); }
        .btn-outline:hover { background: rgba(45, 140, 255, 0.1); color: var(--secondary); }

        /* --- Section Ortak Stil --- */
        section { padding: 100px 10%; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--primary); margin-bottom: 15px; }
        .section-header div { width: 80px; height: 4px; background: var(--secondary); margin: 0 auto; border-radius: 2px; }

        /* --- Çözümler (Grid) --- */
        .solutions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .solution-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 20px;
            transition: 0.5s;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        .solution-card:hover {
            border-color: var(--secondary);
            background: rgba(45, 140, 255, 0.05);
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.1);
        }

        .solution-card h3 { font-family: 'Orbitron', sans-serif; margin-bottom: 15px; font-size: 1.4rem; color: var(--secondary); }
        .solution-card p { color: #8a99b1; }

        /* --- İletişim Bölümü --- */
        .contact-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            padding: 60px;
            margin-bottom: 100px;
            border: 1px solid var(--glass-border);
        }

        .contact-flex {
            display: flex;
            gap: 50px;
            flex-wrap: wrap;
        }

        .contact-info { flex: 1; min-width: 300px; }
        .contact-info h3 { font-family: 'Orbitron', sans-serif; margin-bottom: 30px; font-size: 1.8rem; }
