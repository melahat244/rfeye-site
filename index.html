<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFEye Smart Connection</title>
<style>
    body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#060b16; color:white; min-height: 100vh; }
    .bg { position:fixed; inset:0; background:radial-gradient(circle, #0d1d40, #060b16); z-index: -1; }
    
    /* Arka plandaki halka animasyonu */
    .pulse { position:absolute; width:240px; height:240px; border:2px solid #2d8cff; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); animation:pulse 2s infinite; opacity: 0; }
    .pulse:nth-child(2) { animation-delay:1s; }
    @keyframes pulse { 0% { opacity:0.5; transform:translate(-50%,-50%) scale(.5); } 100% { opacity:0; transform:translate(-50%,-50%) scale(2.5); } }

    .container { display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; box-sizing: border-box; position: relative; z-index: 10; }
    
    .card { 
        background: rgba(255, 255, 255, 0.05); 
        padding: 15px; 
        border-radius: 20px; 
        backdrop-filter: blur(15px); 
        width: 100%; 
        max-width: 600px; 
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.1);
        text-align: center;
    }

    .card img { 
        width: 100%; 
        height: auto; 
        border-radius: 12px; 
        display: block;
        margin-bottom: 20px;
        background: rgba(0,0,0,0.2); /* Görsel yüklenene kadar alan belli olsun */
    }

    .actions { display: flex; flex-direction: column; gap: 10px; }
    .btn { 
        text-decoration:none; 
        color:white; 
        padding: 15px; 
        border-radius: 12px; 
        background: #2d8cff; 
        transition: 0.3s;
        font-weight: bold;
        display: block;
    }
    
    .footer-info { margin-top: 15px; font-size: 0.8rem; color: #8a99b1; }
</style>
</head>
<body>

<div class='bg'>
    <div class='pulse'></div>
    <div class='pulse'></div>
</div>

<div class='container'>
    <div class='card'>
        <img src="file_000000004f1071f4a8e3a3299f418ce5.png" alt="RFEye">
        
        <div class="actions">
            <a class='btn' href='tel:+905071139040'>📞 Melahat Onaran Ara</a>
            <a class='btn' href='tel:+905334321612'>📞 Hayri Can Onaran Ara</a>
        </div>

        <div class="footer-info">
            📍 Malatya Battalgazi Teknokent
        </div>
    </div>
</div>

</body>
</html>
