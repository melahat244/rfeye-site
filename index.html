<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFEye Smart Connection</title>
<style>
    /* Tasarımın ruhuna uygun koyu arka plan */
    body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#060b16; color:white; overflow-x:hidden; min-height: 100vh; }
    .bg { position:fixed; inset:0; background:radial-gradient(circle, #0d1d40, #060b16); z-index: -1; }
    
    /* Hareketli halka efekti */
    .pulse { position:absolute; width:240px; height:240px; border:2px solid #2d8cff; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); animation:pulse 2s infinite; opacity: 0; }
    .pulse:nth-child(2) { animation-delay:1s; }
    @keyframes pulse { 0% { opacity:0.5; transform:translate(-50%,-50%) scale(.5); } 100% { opacity:0; transform:translate(-50%,-50%) scale(2.5); } }

    .container { display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; box-sizing: border-box; }
    
    .card { 
        background: rgba(255, 255, 255, 0.03); 
        padding: 15px; 
        border-radius: 20px; 
        backdrop-filter: blur(15px); 
        width: 100%; 
        max-width: 800px; 
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.1);
        text-align: center;
    }

    /* Ana Görsel Ayarı */
    .card img { 
        width: 100%; 
        height: auto; 
        border-radius: 12px; 
        display: block;
        margin-bottom: 20px;
    }

    /* İletişim Butonları Grubu */
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    .btn { 
        text-decoration:none; 
        color:white; 
        padding: 15px 10px; 
        border-radius: 12px; 
        background: rgba(45, 140, 255, 0.2); 
        border: 1px solid #2d8cff;
        transition: 0.3s;
        font-size: 0.9rem;
        font-weight: bold;
    }
    .btn:hover { background: #2d8cff; transform: translateY(-2px); }
    
    .footer-info { margin-top: 20px; font-size: 0.85rem; color: #8a99b1; }

    /* Mobil Uyumluluk */
    @media (max-width: 600px) {
        .actions { grid-template-columns: 1fr; }
        .card { padding: 10px; }
    }
</style>
</head>
<body>

<div class='bg'>
    <div class='pulse'></div>
    <div class='pulse'></div>
</div>

<div class='container'>
    <div class='card'>
        <img src="2268.png" alt="RFEye Logo ve İletişim">
        
        <div class="actions">
            <a class='btn' href='tel:+905071139040'>📞 Melahat Onaran</a>
            <a class='btn' href='tel:+905334321612'>📞 Hayri Can Onaran</a>
            <a class='btn' href='mailto:info@rfeye.org' style="grid-column: span 2; background: transparent; border-color: rgba(255,255,255,0.3);">✉️ info@rfeye.org</a>
        </div>

        <div class="footer-info">
            📍 Malatya Battalgazi Teknokent
        </div>
    </div>
</div>

</body>
</html>
