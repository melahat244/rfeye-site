<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFEye | Smart Connection</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2d8cff;
            --secondary: #00f2fe;
            --bg: #060b16;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Arka plan siber çizgiler ve ışıklar */
        .bg-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #0d1d40 0%, #060b16 100%);
            z-index: -1;
        }

        /* Canlı dönen teknolojik ana kart */
        .tech-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(45, 140, 255, 0.1);
            text-align: center;
            animation: cardFloat 6s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px) rotateY(0deg); }
            50% { transform: translateY(-15px) rotateY(5deg); }
        }

        /* Parlayan RFEye Logosu */
        .brand-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #ffffff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        .subtitle {
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 35px;
            font-weight: 600;
        }

        /* İletişim Butonları */
        .btn-list { display: flex; flex-direction: column; gap: 15px; }
        
        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s all ease;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-btn:hover {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            transform: scale(1.03);
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.4);
        }

        /* Bilgi Altlığı */
        .info-footer {
            margin-top: 35px;
            font-size: 0.85rem;
            color: #7a8ba3;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="tech-card">
        <div class="brand-logo">RFEYE</div>
        <div class="subtitle">Smart Connection</div>
        
        <div class="btn-list">
            <a class="action-btn" href="tel:+905071139040">📞 Melahat Onaran Ara</a>
            <a class="action-btn" href="tel:+905334321612">📞 Hayri Can Onaran Ara</a>
            <a class="action-btn" href="mailto:info@rfeye.org">✉️ info@rfeye.org Gönder</a>
        </div>

        <div class="info-footer">
            📍 Malatya Battalgazi Teknokent
        </div>
    </div>

</body>
</html>
